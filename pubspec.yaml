name: laventra_mobile
description: "Laventra - Car Wash Management"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Network
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1

  # Biometrics
  local_auth: ^2.3.0

  # Utils
  pretty_dio_logger: ^1.4.0
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0
  intl: ^0.19.0
  path_provider: ^2.1.4

  # File open / share
  open_file: ^3.5.1
  share_plus: ^10.1.2

  # Push notifications (disabled — re-enable once GoogleService-Info.plist / google-services.json are added)
  # firebase_core: ^3.6.0
  # firebase_messaging: ^15.1.3
  # flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

